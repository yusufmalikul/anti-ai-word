<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Humanize — rewrite AI text to sound human</title>
    <meta name="description" content="Paste AI-sounding text and get a natural, human rewrite." />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="bg-neutral-50 text-neutral-900 antialiased">
    <main class="mx-auto max-w-2xl px-6 py-16">
      <header class="mb-10">
        <h1 class="text-3xl font-semibold tracking-tight">Humanize</h1>
        <p class="mt-2 text-neutral-600">Rewrite AI-sounding text into natural, human prose.</p>
      </header>

      <section class="space-y-4">
        <textarea
          id="input"
          rows="10"
          placeholder="Paste your AI-sounding text here..."
          class="w-full rounded-xl border border-neutral-200 bg-white p-4 text-base shadow-sm outline-none transition focus:border-neutral-400 focus:ring-2 focus:ring-neutral-200"
        ></textarea>

        <div class="flex items-center justify-between">
          <span id="status" class="text-sm text-neutral-500" aria-live="polite"></span>
          <button
            id="rewrite"
            class="rounded-xl bg-neutral-900 px-5 py-2.5 text-sm font-medium text-white shadow-sm transition hover:bg-neutral-700 disabled:cursor-not-allowed disabled:opacity-50"
          >
            Rewrite
          </button>
        </div>

        <div
          id="output-wrap"
          class="hidden rounded-xl border border-neutral-200 bg-white p-4 shadow-sm"
        >
          <div class="mb-2 flex items-center justify-between">
            <h2 class="text-sm font-medium text-neutral-700">Rewritten</h2>
            <button
              id="copy"
              class="text-xs text-neutral-500 hover:text-neutral-900"
            >
              Copy
            </button>
          </div>
          <p id="output" class="whitespace-pre-wrap text-base leading-relaxed"></p>
        </div>
      </section>

      <footer class="mt-16 text-center text-xs text-neutral-400">
        Powered by Gemini Flash · Hosted on Cloudflare Pages
      </footer>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
